version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rabbitcrm_postgres
    environment:
      POSTGRES_DB: rabbitcrm
      POSTGRES_USER: rabbitcrm
      POSTGRES_PASSWORD: rabbitcrm123
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    networks:
      - rabbitcrm_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rabbitcrm_backend
    volumes:
      - ./backend:/app
      - ./backend/static:/app/static
      - ./backend/media:/app/media
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_NAME=rabbitcrm
      - DATABASE_USER=rabbitcrm
      - DATABASE_PASSWORD=rabbitcrm123
      - SECRET_KEY=your-super-secret-key-change-in-production
      - DEBUG=True
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - rabbitcrm_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rabbitcrm_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    networks:
      - rabbitcrm_network

volumes:
  postgres_data:

networks:
  rabbitcrm_network:
    driver: bridge
